name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/schoolmanagement
            git pull origin main
            cd SchoolManagementBackend/CollegeManagement
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            python manage.py collectstatic --no-input
            python manage.py migrate --no-input
            sudo systemctl restart schoolmanagement.service
            echo "Backend deployed successfully"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: schoolmanagement_FrontEnd/package-lock.json

      - name: Install dependencies
        working-directory: schoolmanagement_FrontEnd
        run: npm ci

      - name: Build React app
        working-directory: schoolmanagement_FrontEnd
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: node --max-old-space-size=4096 ./node_modules/react-scripts/scripts/build.js

      - name: Deploy Frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "schoolmanagement_FrontEnd/build/*"
          target: "/var/www/schoolmanagement-frontend/build"
          strip_components: 2

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl reload nginx
            echo "Frontend deployed and Nginx reloaded"
